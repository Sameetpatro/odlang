version: 2

project_name: odlang

before:
  hooks:
    - go mod tidy

builds:
  - id: od
    main: ./cmd/od
    binary: odlang
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - name_template: "od_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: Sameetpatro
    name: odlang
  name_template: "OdLang {{.Version}}"
  draft: false
  prerelease: auto

brews:
  - name: odlang
    repository:
      owner: Sameetpatro
      name: homebrew-odlang
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/Sameetpatro/odlang"
    description: "OdLang — a programming language with Odia-inspired keywords"
    license: MIT
    install: |
      bin.install "odlang"
    test: |
      system "#{bin}/odlang", "version"

scoops:
  - name: odlang
    repository:
      owner: Sameetpatro
      name: scoop-odlang
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    directory: bucket
    homepage: "https://github.com/Sameetpatro/odlang"
    description: "OdLang — a programming language with Odia-inspired keywords"
    license: MIT